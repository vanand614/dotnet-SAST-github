name: DotNet SAST

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    uses: vanand614/security-platform/.github/workflows/sast-workflow-init.yml@main

    with:
      language: csharp

      build-command: |
        dotnet restore ./app/SampleWebApi/SampleWebApi.csproj
        dotnet build ./app/SampleWebApi/SampleWebApi.csproj --configuration Release