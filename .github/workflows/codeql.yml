name: Violet CodeQL

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  codeql:

    uses: vanand614/security-platform/.github/workflows/reusable-codeql.yml@main

    with:
      language: csharp
      runner: ubuntu-latest
      build-command: |
        dotnet restore ./app/SampleWebApi/SampleWebApi.csproj
        dotnet build ./app/SampleWebApi/SampleWebApi.csproj --configuration Release